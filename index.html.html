<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Högt & Lågt-Städ AB</title>
<style>
:root {
  --bg: #f2efe8;
  --surface: #ffffff;
  --dark: #111111;
  --accent: #7A9E7E;
  --accent-dark: #5a7d5e;
  --accent-light: #eef4ee;
  --text: #1a1a1a;
  --muted: #888880;
  --border: #e2ddd6;
  --danger: #e05555;
  --warn: #e09030;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCREENS ─── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ─── HOME SCREEN ─── */
#screen-home {
  background: var(--dark);
  padding: 0;
}

.home-header {
  padding: 60px 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 16px;
}

.home-logo {
  width: 64px;
  height: 64px;
  object-fit: contain;
  border-radius: 14px;
}

.home-title {
  font-size: 32px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.5px;
  line-height: 1.1;
}

.home-sub {
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.home-body {
  flex: 1;
  background: var(--bg);
  border-radius: 28px 28px 0 0;
  padding: 24px 20px 100px;
  margin-top: 8px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  padding-left: 4px;
}

.project-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 0;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}

.project-card:active { transform: scale(0.98); }

  .project-card-wrap {
    margin-bottom: 10px;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .project-card-wrap .project-card {
    box-shadow: none;
    border-radius: 0;
    margin-bottom: 0;
  }

  .delete-confirm-row {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: #fff5f5;
    border-top: 1px solid #fdd;
  }

  .btn-confirm-delete {
    flex: 1;
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }

  .btn-confirm-cancel {
    flex: 1;
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }

.project-card-accent {
  width: 4px;
  height: 100%;
  position: absolute;
  left: 0; top: 0;
  background: var(--accent);
  border-radius: 4px 0 0 4px;
  pointer-events: none;
}

.project-card-icon {
  font-size: 28px;
  flex-shrink: 0;
}

.project-card-info { flex: 1; min-width: 0; }

.project-card-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-card-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.project-card-progress {
  text-align: right;
  flex-shrink: 0;
}

.progress-ring-text {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
}

.progress-ring-sub {
  font-size: 10px;
  color: var(--muted);
}

.project-card-delete {
  background: none;
  border: none;
  font-size: 22px;
  color: #bbb;
  padding: 10px 12px;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.project-card-delete:active { color: var(--danger); transform: scale(1.2); }

.btn-new-project {
  width: 100%;
  background: var(--dark);
  color: white;
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 4px;
  transition: opacity 0.15s;
}

.btn-new-project:active { opacity: 0.8; }

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}

.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: flex-end;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
}

.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  margin: 0 auto 20px;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  font-family: -apple-system, sans-serif;
  font-size: 15px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  background: var(--bg);
  color: var(--text);
  appearance: none;
}

.form-input:focus { outline: none; border-color: var(--accent); }

.type-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.type-option {
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  background: var(--bg);
}

.type-option.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}

.type-option .type-icon { font-size: 24px; display: block; margin-bottom: 4px; }
.type-option .type-name { font-size: 13px; font-weight: 600; color: var(--text); }

.worker-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

.worker-tag {
  background: var(--dark);
  color: white;
  border-radius: 99px;
  padding: 5px 12px 5px 10px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.worker-tag-remove {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-size: 16px;
  padding: 0;
  line-height: 1;
}

.worker-add-row {
  display: flex;
  gap: 8px;
}

.btn-modal-primary {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
}

.btn-modal-secondary {
  width: 100%;
  background: var(--border);
  color: var(--text);
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

/* ─── JOB SCREEN ─── */
#screen-job { background: var(--bg); }

.job-header {
  background: var(--dark);
  padding: 54px 20px 20px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.job-header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.btn-back {
  background: rgba(255,255,255,0.12);
  border: none;
  color: white;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
}

.job-title-wrap { flex: 1; min-width: 0; }

.job-title {
  font-size: 18px;
  font-weight: 700;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.job-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

.job-header-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.btn-icon {
  background: rgba(255,255,255,0.12);
  border: none;
  color: white;
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 18px;
  cursor: pointer;
}

.progress-strip {
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-track {
  flex: 1;
  height: 5px;
  background: rgba(255,255,255,0.15);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s ease;
}

.progress-label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
  font-weight: 500;
}

.job-body { flex: 1; padding: 16px 16px 100px; }

/* ─── SECTION ─── */
.checklist-section {
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 16px;
  background: var(--dark);
  cursor: pointer;
  user-select: none;
}

.section-head-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }

.section-head-title {
  font-size: 16px;
  font-weight: 700;
  color: white;
  flex: 1;
}

.section-head-count {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  background: rgba(122,158,126,0.2);
  border-radius: 99px;
  padding: 2px 8px;
  flex-shrink: 0;
}

.section-check-all {
  background: none;
  border: 1.5px solid rgba(255,255,255,0.25);
  color: white;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
}

.section-check-all.all-done {
  background: var(--accent);
  border-color: var(--accent);
}

.section-toggle { color: rgba(255,255,255,0.4); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
.section-head.collapsed .section-toggle { transform: rotate(-90deg); }

.section-items { display: flex; flex-direction: column; }

/* ─── ITEM ─── */
.checklist-item {
  border-bottom: 1px solid var(--border);
}

.checklist-item:last-of-type { border-bottom: none; }

.item-main {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  transition: background 0.15s;
}

.item-main:active { background: var(--bg); }

.item-check {
  width: 26px;
  height: 26px;
  border: 2px solid var(--border);
  border-radius: 7px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: white;
}

.checklist-item.done .item-check {
  background: var(--accent);
  border-color: var(--accent);
}

.item-check-inner {
  display: none;
  width: 6px;
  height: 11px;
  border: 2.5px solid white;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translateY(-1px);
}

.checklist-item.done .item-check-inner { display: block; }

.item-body { flex: 1; min-width: 0; }

.item-label {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.35;
  transition: all 0.2s;
}

.checklist-item.done .item-label {
  text-decoration: line-through;
  color: var(--muted);
}

.item-note { font-size: 12px; color: var(--muted); margin-top: 2px; }

.item-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 5px;
  align-items: center;
}

.item-timestamp {
  font-size: 11px;
  color: var(--accent-dark);
  background: var(--accent-light);
  border-radius: 99px;
  padding: 2px 8px;
  font-weight: 500;
}

.item-assignee {
  font-size: 11px;
  color: white;
  background: var(--dark);
  border-radius: 99px;
  padding: 2px 8px;
  font-weight: 500;
}

.item-has-comment {
  font-size: 11px;
  color: var(--warn);
  background: #fff8ee;
  border-radius: 99px;
  padding: 2px 8px;
}

.item-has-photo {
  font-size: 11px;
  color: #5577cc;
  background: #eef0ff;
  border-radius: 99px;
  padding: 2px 8px;
}

.item-actions-row {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  align-items: flex-start;
  margin-top: 2px;
}

.item-action-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 2px;
  opacity: 0.35;
  transition: opacity 0.15s;
}

.item-action-btn:active { opacity: 1; }
.item-action-btn.has-data { opacity: 0.8; }

/* ─── ITEM EXPANDED ─── */
.item-expanded {
  display: none;
  padding: 0 16px 14px 54px;
  flex-direction: column;
  gap: 10px;
  background: #fafaf8;
  border-top: 1px solid var(--border);
}

.item-expanded.open { display: flex; }

.item-comment-input {
  font-family: -apple-system, sans-serif;
  font-size: 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  background: white;
  color: var(--text);
  width: 100%;
  resize: none;
  min-height: 60px;
}

.item-comment-input:focus { outline: none; border-color: var(--accent); }

.comment-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.comment-label.customer { color: var(--danger); }
.comment-label.internal { color: var(--muted); }

.item-comment-input.customer-comment {
  border-color: #fcc;
  background: #fff8f8;
}

.item-comment-input.customer-comment:focus { border-color: var(--danger); }

.item-comment-input.internal-comment {
  border-color: var(--border);
  background: #f9f9f6;
  color: var(--muted);
}

.assign-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.assign-label { font-size: 12px; color: var(--muted); font-weight: 500; flex-shrink: 0; }

.assign-select {
  font-family: -apple-system, sans-serif;
  font-size: 13px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  background: white;
  color: var(--text);
  appearance: none;
}

.assign-select:focus { outline: none; border-color: var(--accent); }

.photo-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.photo-thumb {
  width: 64px;
  height: 64px;
  border-radius: 8px;
  object-fit: cover;
  border: 1.5px solid var(--border);
  position: relative;
  cursor: pointer;
}

.photo-thumb-wrap {
  position: relative;
  display: inline-block;
}

.photo-remove {
  position: absolute;
  top: -6px;
  right: -6px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 99px;
  width: 20px;
  height: 20px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.btn-add-photo {
  width: 64px;
  height: 64px;
  border-radius: 8px;
  border: 1.5px dashed var(--border);
  background: white;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  flex-shrink: 0;
}

.hidden-file { display: none; }

.item-edit-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.item-edit-input {
  font-family: -apple-system, sans-serif;
  font-size: 14px;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 8px 10px;
  background: white;
  color: var(--text);
  width: 100%;
}

.item-edit-input:focus { outline: none; }

.item-edit-note {
  border-color: var(--border);
  font-size: 13px;
  color: var(--muted);
}

.edit-btn-row {
  display: flex;
  gap: 6px;
}

.btn-save-item {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.btn-cancel-item {
  background: var(--border);
  color: var(--text);
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.btn-delete-item {
  background: #fff0f0;
  color: var(--danger);
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-left: auto;
}

/* ─── ADD ITEM ROW ─── */
.add-item-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: #fafaf8;
  border-top: 1px dashed var(--border);
}

.add-item-input {
  font-family: -apple-system, sans-serif;
  font-size: 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  flex: 1;
  background: white;
  color: var(--text);
}

.add-item-input:focus { outline: none; border-color: var(--accent); }

.btn-add-item {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 9px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

/* ─── BOTTOM BAR ─── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--border);
  padding: 12px 16px 28px;
  display: flex;
  gap: 10px;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
}

.btn-full {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-dark { background: var(--dark); color: white; }
.btn-green { background: var(--accent); color: white; }
.btn-light { background: var(--border); color: var(--text); }

/* ─── COMPLETE BANNER ─── */
.complete-banner {
  display: none;
  background: var(--dark);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  margin-bottom: 14px;
  animation: popIn 0.35s ease;
}

.complete-banner.show { display: block; }
.complete-banner .big { font-size: 36px; margin-bottom: 6px; }
.complete-banner h3 { font-size: 20px; font-weight: 700; color: white; font-family: Georgia, serif; }
.complete-banner p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }

@keyframes popIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ─── PDF REPORT SCREEN ─── */
#screen-report { background: var(--bg); }

.report-header {
  background: var(--dark);
  padding: 54px 20px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.report-body {
  padding: 20px 16px 100px;
  flex: 1;
}

.report-card {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}

.report-card h2 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 12px;
}

.report-stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.report-stat {
  text-align: center;
  background: var(--bg);
  border-radius: 10px;
  padding: 14px;
}

.report-stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
.report-stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

.report-item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.report-item-row:last-child { border-bottom: none; }

.report-item-check { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.report-item-info { flex: 1; }
.report-item-label { font-size: 14px; font-weight: 400; }
.report-item-label.done-label { color: var(--muted); text-decoration: line-through; }
.report-item-ts { font-size: 11px; color: var(--accent-dark); margin-top: 2px; }
.report-item-comment { font-size: 12px; color: var(--warn); margin-top: 2px; font-style: italic; }

.report-photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.report-photo { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

.sig-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 8px;
}

.sig-box {
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}

.sig-box input {
  font-family: -apple-system, sans-serif;
  font-size: 14px;
  border: none;
  background: transparent;
  width: 100%;
  color: var(--text);
}

.sig-box input:focus { outline: none; }
.sig-box-label { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 500; }

/* ─── VOICE INDICATOR ─── */
.voice-indicator {
  display: none;
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--dark);
  color: white;
  border-radius: 99px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  z-index: 150;
  gap: 10px;
  align-items: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  animation: pulse 1s infinite;
}

.voice-indicator.listening { display: flex; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 4px 32px rgba(122,158,126,0.5); }
}

.voice-dot {
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* ─── PRINT ─── */
@media print {
  /* Hide UI chrome */
  .bottom-bar, .job-header-actions, .section-check-all,
  .item-actions-row, .add-item-row, .btn-add-photo,
  .photo-remove, .item-edit-row, .voice-indicator,
  .report-header { display: none !important; }

  /* Remove browser URL/date headers and footers */
  @page {
    margin: 14mm 12mm;
    size: A4;
  }

  html, body { background: white; margin: 0; padding: 0; }

  /* Report body spacing */
  .report-body { padding: 0 !important; }

  /* Report cards - keep together, no orphans */
  .report-card {
    box-shadow: none !important;
    border: 1px solid #ddd !important;
    border-radius: 8px !important;
    page-break-inside: avoid;
    break-inside: avoid;
    margin-bottom: 10px !important;
  }

  /* Items inside cards should not break mid-item */
  .report-item-row {
    page-break-inside: avoid;
    break-inside: avoid;
  }

  /* Section headings stay with at least first item */
  .report-card h2 {
    page-break-after: avoid;
    break-after: avoid;
  }

  /* Keep fault summary block together */
  .report-card[style*="border:2px solid"] {
    page-break-inside: avoid;
    break-inside: avoid;
  }

  /* Photos - reasonable size for print */
  .report-photo-grid img,
  .report-card img { max-width: 120px !important; max-height: 120px !important; }

  /* Checklist screen print styles */
  .job-header {
    position: static !important;
    background: white !important;
    color: black !important;
    border-bottom: 2px solid #111;
    padding: 16px !important;
  }

  .job-title, .job-subtitle, .progress-label { color: black !important; }
  .progress-track { background: #eee !important; }

  .checklist-section {
    box-shadow: none !important;
    border: 1px solid #ddd;
    page-break-inside: avoid;
    break-inside: avoid;
    margin-bottom: 8px !important;
  }

  .section-head {
    background: #f0f0f0 !important;
    page-break-after: avoid;
    break-after: avoid;
  }

  .section-head-title { color: black !important; }
  .checklist-item { page-break-inside: avoid; break-inside: avoid; }
  .item-expanded.open { display: flex !important; background: #fafafa; }
}
</style>
</head>

<!-- ═══ HOME SCREEN ═══ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <img class="home-logo" id="home-logo" src="" alt="Högt & Lågt-Städ AB">
    <div>
      <div class="home-title">Högt & Lågt-Städ AB</div>
      <div class="home-sub">Städverktyg</div>
    </div>
  </div>
  <div class="home-body">
    <div class="section-label">Aktiva projekt</div>
    <div id="projects-list"></div>
    <button class="btn-new-project" onclick="openNewProjectModal()">
      <span>＋</span> Nytt projekt
    </button>

    <div style="margin-top:28px">
      <div class="section-label">Avklarade projekt</div>
      <div id="done-projects-list"></div>
    </div>
  </div>
</div>

<!-- ═══ JOB SCREEN ═══ -->
<div id="screen-job" class="screen">
  <div class="job-header">
    <div class="job-header-top">
      <button class="btn-back" onclick="goHome()">← Hem</button>
      <div class="job-title-wrap">
        <div class="job-title" id="job-title">–</div>
        <div class="job-subtitle" id="job-subtitle">–</div>
      </div>
      <div class="job-header-actions">
        <button class="btn-icon" onclick="openVoice()" title="Röststyrning">🎙️</button>
        <button class="btn-icon" onclick="showReport()" title="Rapport">📋</button>
      </div>
    </div>
    <div class="progress-strip">
      <div class="progress-track"><div class="progress-fill" id="job-progress-fill"></div></div>
      <div class="progress-label" id="job-progress-label">0/0</div>
    </div>
  </div>

  <div class="job-body" id="job-body">
    <div class="complete-banner" id="complete-banner">
      <div class="big">✅</div>
      <h3>Jobbet klart!</h3>
      <p>Alla punkter är avbockade</p>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button onclick="markCompleted()" style="flex:1;background:var(--accent);color:white;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif">
          ✓ Markera som avklarat
        </button>
      </div>
    </div>
    <div id="checklist-container"></div>
  </div>

  <div class="bottom-bar" id="job-bottom-bar">
    <button class="btn-full btn-light" onclick="resetJob()">Återställ</button>
    <button class="btn-full btn-green" onclick="showReport()">📋 Kundrapport</button>
  </div>
</div>

<!-- ═══ REPORT SCREEN ═══ -->
<div id="screen-report" class="screen">
  <div class="report-header">
    <button class="btn-back" onclick="closeReport()">← Tillbaka</button>
    <span style="color:white;font-size:17px;font-weight:700;flex:1">Kundrapport</span>
    <button class="btn-icon" onclick="window.print()">🖨️</button>
  </div>
  <div class="report-body" id="report-body"></div>
</div>

<!-- ═══ NEW PROJECT MODAL ═══ -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nytt projekt</div>

    <div class="form-group">
      <label class="form-label">Adress / Objekt</label>
      <input class="form-input" id="np-address" placeholder="T.ex. Storgatan 12, Lgh 1201" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Typ av städning</label>
      <div class="type-grid" id="type-grid">
        <div class="type-option selected" data-type="flytt" onclick="selectType(this)">
          <span class="type-icon">📦</span>
          <span class="type-name">Flyttstäd</span>
        </div>
        <div class="type-option" data-type="hem" onclick="selectType(this)">
          <span class="type-icon">🏠</span>
          <span class="type-name">Hemstäd</span>
        </div>
        <div class="type-option" data-type="kontor" onclick="selectType(this)">
          <span class="type-icon">🏢</span>
          <span class="type-name">Kontorsstäd</span>
        </div>
        <div class="type-option" data-type="trapphus" onclick="selectType(this)">
          <span class="type-icon">🪜</span>
          <span class="type-name">Trapphus</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Städare på jobbet</label>
      <div class="worker-tags" id="worker-tags"></div>
      <div class="worker-add-row">
        <input class="form-input" id="worker-input" placeholder="Namn på städare" type="text"
          onkeydown="if(event.key==='Enter') addWorker()" style="flex:1">
        <button class="btn-add-item" onclick="addWorker()">Lägg till</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Datum</label>
      <input class="form-input" id="np-date" type="date">
    </div>

    <button class="btn-modal-primary" onclick="createProject()">Skapa projekt</button>
    <button class="btn-modal-secondary" onclick="closeModal('modal-new-project')">Avbryt</button>
  </div>
</div>

<!-- Voice indicator -->
<div class="voice-indicator" id="voice-indicator">
  <div class="voice-dot"></div>
  <span id="voice-text">Lyssnar... säg "klar"</span>
</div>

<input type="file" id="photo-input" class="hidden-file" accept="image/*" capture="environment">

// ═══════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════
let projects = [];
let currentProjectId = null;
let photoTarget = { si: null, ii: null };
let voiceRecognition = null;
let selectedType = 'flytt';
let tempWorkers = [];

function save() {
  try { localStorage.setItem('hl_projects', JSON.stringify(projects)); } catch(e) {}
}

function load() {
  try {
    const d = localStorage.getItem('hl_projects');
    if (d) projects = JSON.parse(d);
  } catch(e) { projects = []; }
}

function currentProject() {
  return projects.find(p => p.id === currentProjectId);
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════

// ─── CONFIRM HELPER ───
function showConfirm(message, onOk) {
  document.getElementById('confirm-message').textContent = message;
  const okBtn = document.getElementById('confirm-ok');
  okBtn.onclick = function() {
    closeModal('modal-confirm');
    onOk();
  };
  document.getElementById('modal-confirm').classList.add('open');
}
function renderHome() {
  const active = projects.filter(p => !p.completed);
  const done = projects.filter(p => p.completed);

  const listEl = document.getElementById('projects-list');
  const doneEl = document.getElementById('done-projects-list');

  if (active.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="emoji">🧹</div><p>Inga aktiva projekt än.<br>Tryck på "Nytt projekt" för att börja.</p></div>`;
  } else {
    listEl.innerHTML = active.map(p => projectCardHTML(p)).join('');
  }

  if (done.length === 0) {
    doneEl.innerHTML = '';
  } else {
    doneEl.innerHTML = done.map(p => projectCardHTML(p, true)).join('');
  }
}

function projectCardHTML(p, isDone = false) {
  const total = p.sections.reduce((a,s) => a + s.items.length, 0);
  const doneCount = p.sections.reduce((a,s) => a + s.items.filter(i=>i.done).length, 0);
  const pct = total ? Math.round(doneCount/total*100) : 0;
  const tmpl = TEMPLATES[p.type] || TEMPLATES.flytt;
  const idx = projects.indexOf(p);
  const isConfirming = p._confirming === true;
  return `
    <div class="project-card-wrap">
      <div class="project-card" id="pcard-${idx}">
        <div class="project-card-accent"></div>
        <div class="project-card-icon" onclick="openProjectByIndex(${idx})">${tmpl.icon}</div>
        <div class="project-card-info" onclick="openProjectByIndex(${idx})">
          <div class="project-card-name">${esc(p.address)}</div>
          <div class="project-card-meta">${tmpl.label} · ${p.date}${p.workers.length ? ' · ' + p.workers.join(', ') : ''}</div>
        </div>
        <div class="project-card-progress" onclick="openProjectByIndex(${idx})">
          <div class="progress-ring-text">${pct}%</div>
          <div class="progress-ring-sub">${doneCount}/${total}</div>
        </div>
        <button class="project-card-delete" onclick="askDeleteProject(${idx})">🗑️</button>
      </div>
      ${isConfirming ? `
        <div class="delete-confirm-row">
          <button class="btn-confirm-delete" onclick="confirmDeleteProject(${idx})">🗑️ Ja, ta bort</button>
          <button class="btn-confirm-cancel" onclick="cancelDeleteProject(${idx})">Avbryt</button>
        </div>
      ` : ''}
    </div>
  `;
}

function askDeleteProject(idx) {
  projects.forEach((p,i) => p._confirming = (i === idx));
  renderHome();
}

function cancelDeleteProject(idx) {
  if (projects[idx]) projects[idx]._confirming = false;
  renderHome();
}

function confirmDeleteProject(idx) {
  projects.splice(idx, 1);
  save();
  renderHome();
}

function deleteProjectByIndex(idx) {
  askDeleteProject(idx);
}

function openProjectByIndex(idx) {
  const p = projects[idx];
  if (p && !p._confirming) openProject(p.id);
}

// ═══════════════════════════════════════════════
// NEW PROJECT MODAL
// ═══════════════════════════════════════════════
function openNewProjectModal() {
  selectedType = 'flytt';
  tempWorkers = [];
  document.getElementById('np-address').value = '';
  document.getElementById('np-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('worker-input').value = '';
  renderWorkerTags();
  document.querySelectorAll('.type-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.type === 'flytt');
  });
  document.getElementById('modal-new-project').classList.add('open');
}

function selectType(el) {
  document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
}

function addWorker() {
  const input = document.getElementById('worker-input');
  const name = input.value.trim();
  if (!name) return;
  if (!tempWorkers.includes(name)) tempWorkers.push(name);
  input.value = '';
  renderWorkerTags();
}

function removeWorker(name) {
  tempWorkers = tempWorkers.filter(w => w !== name);
  renderWorkerTags();
}

function renderWorkerTags() {
  document.getElementById('worker-tags').innerHTML = tempWorkers.map(w =>
    `<div class="worker-tag">${esc(w)}<button class="worker-tag-remove" onclick="removeWorker('${esc(w)}')">×</button></div>`
  ).join('');
}

function createProject() {
  const address = document.getElementById('np-address').value.trim();
  if (!address) { alert('Ange adress'); return; }
  const date = document.getElementById('np-date').value;
  const tmpl = TEMPLATES[selectedType];

  const sections = tmpl.sections.map(s => ({
    ...s,
    collapsed: false,
    items: s.items.map(i => ({
      ...i,
      done: false,
      timestamp: null,
      comment: '',
      assignee: '',
      photos: [],
      editing: false,
      expanded: false,
    }))
  }));

  const project = {
    id: 'p_' + Date.now(),
    address,
    type: selectedType,
    date,
    workers: [...tempWorkers],
    sections,
    completed: false,
    createdAt: new Date().toISOString(),
  };

  projects.unshift(project);
  save();
  closeModal('modal-new-project');
  renderHome();
  openProject(project.id);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ═══════════════════════════════════════════════
// JOB SCREEN
// ═══════════════════════════════════════════════
function openProject(id) {
  currentProjectId = id;
  showScreen('screen-job');
  renderJob();
}

function goHome() {
  showScreen('screen-home');
  renderHome();
}

function renderJob() {
  const p = currentProject();
  if (!p) return;
  const tmpl = TEMPLATES[p.type];
  document.getElementById('job-title').textContent = p.address;
  document.getElementById('job-subtitle').textContent = `${tmpl.label} · ${p.date}`;

  const total = p.sections.reduce((a,s) => a + s.items.length, 0);
  const doneCount = p.sections.reduce((a,s) => a + s.items.filter(i=>i.done).length, 0);
  const pct = total ? Math.round(doneCount/total*100) : 0;
  document.getElementById('job-progress-fill').style.width = pct + '%';
  document.getElementById('job-progress-label').textContent = `${doneCount}/${total}`;
  const isComplete = doneCount === total && total > 0;
  document.getElementById('complete-banner').classList.toggle('show', isComplete);

  // Auto-mark completed after short delay when all done
  if (isComplete && !p.completed) {
    clearTimeout(p._autoCompleteTimer);
    p._autoCompleteTimer = setTimeout(() => {
      const cur = currentProject();
      if (cur && cur.id === p.id) {
        const t2 = cur.sections.reduce((a,s) => a + s.items.length, 0);
        const d2 = cur.sections.reduce((a,s) => a + s.items.filter(i=>i.done).length, 0);
        if (d2 === t2) { cur.completed = true; save(); }
      }
    }, 3000);
  } else if (!isComplete && p.completed) {
    p.completed = false;
    save();
  }

  // Show/hide "Ångra avklarat" in bottom bar if already completed
  const bar = document.getElementById('job-bottom-bar');
  if (bar) {
    if (p.completed) {
      bar.innerHTML = '<button class="btn-full btn-light" onclick="undoCompleted()">↩ Ångra avklarat</button><button class="btn-full btn-green" onclick="showReport()">\uD83D\uDCCB Kundrapport</button>';
    } else {
      bar.innerHTML = '<button class="btn-full btn-light" onclick="resetJob()">Återställ</button><button class="btn-full btn-green" onclick="showReport()">\uD83D\uDCCB Kundrapport</button>';
    }
  }

  const container = document.getElementById('checklist-container');
  container.innerHTML = '';
  p.sections.forEach((section, si) => renderSection(section, si, container, p));
}

function renderSection(section, si, container, p) {
  const doneCount = section.items.filter(i => i.done).length;
  const allDone = doneCount === section.items.length;

  const div = document.createElement('div');
  div.className = 'checklist-section';
  div.id = `section-${si}`;

  div.innerHTML = `
    <div class="section-head${section.collapsed ? ' collapsed' : ''}" id="sh-${si}" onclick="toggleSection(${si})">
      <span class="section-head-icon">${section.icon}</span>
      <span class="section-head-title">${esc(section.title)}</span>
      <span class="section-head-count">${doneCount}/${section.items.length}</span>
      <button class="section-check-all${allDone ? ' all-done' : ''}"
        onclick="checkAllSection(event,${si})">${allDone ? '✓ Klart' : 'Bocka alla'}</button>
      <span class="section-toggle">▾</span>
    </div>
    <div class="section-items" id="items-${si}" style="display:${section.collapsed ? 'none' : 'flex'}">
      ${section.items.map((item, ii) => itemHTML(item, si, ii, p)).join('')}
      <div class="add-item-row">
        <input class="add-item-input" id="new-${si}" placeholder="+ Lägg till punkt..." onkeydown="if(event.key==='Enter') addItem(${si})">
        <button class="btn-add-item" onclick="addItem(${si})">Lägg till</button>
      </div>
    </div>
  `;
  container.appendChild(div);
}

function itemHTML(item, si, ii, p) {
  const hasComment = (item.comment && item.comment.trim()) || (item.internalComment && item.internalComment.trim());
  const hasPhotos = item.photos && item.photos.length > 0;

  const workerOptions = (p.workers||[]).map(w =>
    `<option value="${esc(w)}" ${item.assignee===w?'selected':''}>${esc(w)}</option>`
  ).join('');

  const photosHTML = (item.photos||[]).map((ph, pi) => `
    <div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${ph}" onclick="viewPhoto('${ph}')">
      <button class="photo-remove" onclick="removePhoto(${si},${ii},${pi})">×</button>
    </div>
  `).join('');

  return `
    <div class="checklist-item${item.done ? ' done' : ''}" id="item-${si}-${ii}">
      <div class="item-main">
        <div class="item-check" onclick="toggleItem(${si},${ii})">
          <div class="item-check-inner"></div>
        </div>
        <div class="item-body" onclick="toggleExpanded(${si},${ii})">
          <div class="item-label">${esc(item.label)}</div>
          ${item.note ? `<div class="item-note">${esc(item.note)}</div>` : ''}
          <div class="item-meta">
            ${item.timestamp ? `<span class="item-timestamp">✓ ${item.timestamp}</span>` : ''}
            ${item.assignee ? `<span class="item-assignee">👤 ${esc(item.assignee)}</span>` : ''}
            ${item.comment && item.comment.trim() ? `<span class="item-has-comment" style="background:#fff0f0;color:var(--danger)">⚠️ Felanmälan</span>` : ''}${item.internalComment && item.internalComment.trim() ? `<span class="item-has-comment">🔒 Intern notering</span>` : ''}
            ${hasPhotos ? `<span class="item-has-photo">📷 ${item.photos.length} foto</span>` : ''}
          </div>
        </div>
        <div class="item-actions-row">
          <button class="item-action-btn${hasPhotos?' has-data':''}" onclick="triggerPhoto(${si},${ii})" title="Foto">📷</button>
          <button class="item-action-btn" onclick="startEditItem(${si},${ii})" title="Redigera">✏️</button>
          <button class="item-action-btn" onclick="deleteItem(${si},${ii})" title="Ta bort">×</button>
        </div>
      </div>
      <div class="item-expanded${item.expanded ? ' open' : ''}" id="exp-${si}-${ii}">
        ${item.editing ? `
          <div class="item-edit-row">
            <input class="item-edit-input" id="edit-label-${si}-${ii}" value="${esc(item.label)}" placeholder="Punkttext">
            <input class="item-edit-input item-edit-note" id="edit-note-${si}-${ii}" value="${esc(item.note||'')}" placeholder="Notering (valfritt)">
            <div class="edit-btn-row">
              <button class="btn-save-item" onclick="saveEditItem(${si},${ii})">Spara</button>
              <button class="btn-cancel-item" onclick="cancelEditItem(${si},${ii})">Avbryt</button>
              <button class="btn-delete-item" onclick="deleteItem(${si},${ii})">Ta bort</button>
            </div>
          </div>
        ` : `
          ${p.workers && p.workers.length > 0 ? `
            <div class="assign-row">
              <span class="assign-label">Tilldela:</span>
              <select class="assign-select" onchange="assignWorker(${si},${ii},this.value)">
                <option value="">– Ingen –</option>
                ${workerOptions}
              </select>
            </div>
          ` : ''}
          <div>
            <div class="comment-label customer">⚠️ Felanmälan / avvikelse <span style="font-weight:400;color:#aaa">(syns i kundrapport)</span></div>
            <textarea class="item-comment-input customer-comment" placeholder="T.ex. Handfat trasigt i badrum..."
              onchange="saveComment(${si},${ii},this.value)"
              onblur="saveComment(${si},${ii},this.value)">${esc(item.comment||'')}</textarea>
          </div>
          <div>
            <div class="comment-label internal">🔒 Intern notering <span style="font-weight:400;color:#aaa">(visas ej för kund)</span></div>
            <textarea class="item-comment-input internal-comment" placeholder="T.ex. Behövde extra tid, inget material..."
              onchange="saveInternalComment(${si},${ii},this.value)"
              onblur="saveInternalComment(${si},${ii},this.value)">${esc(item.internalComment||'')}</textarea>
          </div>
          <div class="photo-row">
            ${photosHTML}
            <button class="btn-add-photo" onclick="triggerPhoto(${si},${ii})">📷</button>
          </div>
        `}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// ITEM ACTIONS
// ═══════════════════════════════════════════════
function toggleItem(si, ii) {
  const p = currentProject();
  const item = p.sections[si].items[ii];
  item.done = !item.done;
  item.timestamp = item.done ? formatTime(new Date()) : null;
  save();
  renderJob();
}

function toggleExpanded(si, ii) {
  const p = currentProject();
  const item = p.sections[si].items[ii];
  item.expanded = !item.expanded;
  save();
  renderJob();
}

function toggleSection(si) {
  const p = currentProject();
  p.sections[si].collapsed = !p.sections[si].collapsed;
  save();
  const head = document.getElementById(`sh-${si}`);
  const items = document.getElementById(`items-${si}`);
  head.classList.toggle('collapsed', p.sections[si].collapsed);
  items.style.display = p.sections[si].collapsed ? 'none' : 'flex';
}

function checkAllSection(e, si) {
  e.stopPropagation();
  const p = currentProject();
  const section = p.sections[si];
  const allDone = section.items.every(i => i.done);
  const now = formatTime(new Date());
  section.items.forEach(item => {
    item.done = !allDone;
    item.timestamp = !allDone ? now : null;
  });
  save();
  renderJob();
}

function assignWorker(si, ii, val) {
  const p = currentProject();
  p.sections[si].items[ii].assignee = val;
  save();
  renderJob();
}

function saveComment(si, ii, val) {
  const p = currentProject();
  p.sections[si].items[ii].comment = val;
  save();
}

function saveInternalComment(si, ii, val) {
  const p = currentProject();
  p.sections[si].items[ii].internalComment = val;
  save();
}

function startEditItem(si, ii) {
  const p = currentProject();
  p.sections.forEach(s => s.items.forEach(i => { i.editing = false; }));
  const item = p.sections[si].items[ii];
  item.editing = true;
  item.expanded = true;
  save();
  renderJob();
  setTimeout(() => {
    const el = document.getElementById(`edit-label-${si}-${ii}`);
    if (el) { el.focus(); el.select(); }
  }, 50);
}

function saveEditItem(si, ii) {
  const p = currentProject();
  const labelVal = document.getElementById(`edit-label-${si}-${ii}`).value.trim();
  const noteVal = document.getElementById(`edit-note-${si}-${ii}`).value.trim();
  if (!labelVal) return;
  p.sections[si].items[ii].label = labelVal;
  p.sections[si].items[ii].note = noteVal;
  p.sections[si].items[ii].editing = false;
  save();
  renderJob();
}

function cancelEditItem(si, ii) {
  const p = currentProject();
  p.sections[si].items[ii].editing = false;
  save();
  renderJob();
}

function deleteItem(si, ii) {
  showConfirm('Ta bort punkten?', () => {
    const p = currentProject();
    p.sections[si].items.splice(ii, 1);
    save();
    renderJob();
  });
}

function addItem(si) {
  const input = document.getElementById(`new-${si}`);
  const label = input.value.trim();
  if (!label) return;
  const p = currentProject();
  p.sections[si].items.push({ label, note:'', done:false, timestamp:null, comment:'', assignee:'', photos:[], editing:false, expanded:false });
  save();
  renderJob();
  setTimeout(() => { const el = document.getElementById(`new-${si}`); if(el) el.focus(); }, 50);
}

// ═══════════════════════════════════════════════
// PHOTOS
// ═══════════════════════════════════════════════
function triggerPhoto(si, ii) {
  photoTarget = { si, ii };
  const input = document.getElementById('photo-input');
  input.value = '';
  input.click();
}

document.getElementById('photo-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const p = currentProject();
    const item = p.sections[photoTarget.si].items[photoTarget.ii];
    if (!item.photos) item.photos = [];
    item.photos.push(e.target.result);
    item.expanded = true;
    save();
    renderJob();
  };
  reader.readAsDataURL(file);
});

function removePhoto(si, ii, pi) {
  const p = currentProject();
  p.sections[si].items[ii].photos.splice(pi, 1);
  save();
  renderJob();
}

function viewPhoto(src) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `<img src="${src}" style="max-width:95%;max-height:95%;border-radius:10px;">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

// ═══════════════════════════════════════════════
// VOICE
// ═══════════════════════════════════════════════
function openVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Röststyrning stöds inte i denna webbläsare. Prova Safari 14.5+.'); return; }

  if (voiceRecognition) { stopVoice(); return; }

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'sv-SE';
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = false;

  voiceRecognition.onresult = function(e) {
    const transcript = e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    document.getElementById('voice-text').textContent = '💬 "' + transcript + '"';
    if (transcript.includes('klar') || transcript.includes('nästa') || transcript.includes('bocka')) {
      checkNextUndone();
    }
  };

  voiceRecognition.onerror = function() { stopVoice(); };
  voiceRecognition.onend = function() { stopVoice(); };
  voiceRecognition.start();
  document.getElementById('voice-indicator').classList.add('listening');
}

function stopVoice() {
  if (voiceRecognition) { try { voiceRecognition.stop(); } catch(e) {} voiceRecognition = null; }
  document.getElementById('voice-indicator').classList.remove('listening');
}

function checkNextUndone() {
  const p = currentProject();
  for (let si = 0; si < p.sections.length; si++) {
    for (let ii = 0; ii < p.sections[si].items.length; ii++) {
      if (!p.sections[si].items[ii].done) {
        p.sections[si].items[ii].done = true;
        p.sections[si].items[ii].timestamp = formatTime(new Date());
        save();
        renderJob();
        return;
      }
    }
  }
}

// ═══════════════════════════════════════════════
// REPORT
// ═══════════════════════════════════════════════
function showReport() {
  const p = currentProject();
  if (!p) return;
  const tmpl = TEMPLATES[p.type];
  const total = p.sections.reduce((a,s) => a + s.items.length, 0);
  const doneCount = p.sections.reduce((a,s) => a + s.items.filter(i=>i.done).length, 0);
  const withComments = p.sections.reduce((a,s) => a + s.items.filter(i=>i.comment&&i.comment.trim()).length, 0);
  const withPhotos = p.sections.reduce((a,s) => a + s.items.filter(i=>i.photos&&i.photos.length>0).length, 0);

  // Collect all fault reports and photos
  let allFaults = [];
  let allPhotos = [];
  p.sections.forEach(s => s.items.forEach(item => {
    if (item.comment && item.comment.trim()) {
      allFaults.push({ section: s.title, sectionIcon: s.icon, label: item.label, comment: item.comment, photos: item.photos || [] });
    }
    if (item.photos && item.photos.length > 0) {
      item.photos.forEach(ph => allPhotos.push({ section: s.title, label: item.label, src: ph }));
    }
  }));

  // Fault summary block
  const faultSummaryHTML = allFaults.length > 0 ? `
    <div class="report-card" style="border:2px solid var(--danger);background:#fff8f8">
      <h2 style="color:var(--danger)">⚠️ Felanmälningar (${allFaults.length} st)</h2>
      ${allFaults.map((f, fi) => `
        <div style="padding:10px 0;border-bottom:1px solid #fdd;display:flex;flex-direction:column;gap:6px">
          <div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px">${esc(f.sectionIcon)} ${esc(f.section)}</div>
          <div style="font-size:14px;font-weight:600">${esc(f.label)}</div>
          <div style="font-size:14px;color:var(--danger)">⚠️ ${esc(f.comment)}</div>
          ${f.photos.length > 0 ? `
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
              ${f.photos.map(ph => `<img src="${ph}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #fcc">`).join('')}
            </div>
          ` : ''}
        </div>
      `).join('')}
    </div>
  ` : '';

  const sectionsHTML = p.sections.map(section => `
    <div class="report-card">
      <h2>${section.icon} ${esc(section.title)}</h2>
      ${section.items.map(item => `
        <div class="report-item-row">
          <div class="report-item-check">${item.done ? '✅' : '⬜'}</div>
          <div class="report-item-info">
            <div class="report-item-label${item.done?' done-label':''}">${esc(item.label)}</div>
            ${item.timestamp ? `<div class="report-item-ts">Klar: ${item.timestamp}${item.assignee ? ' · ' + esc(item.assignee) : ''}</div>` : ''}
            ${item.comment && item.comment.trim() ? `<div class="report-item-comment" style="color:var(--danger);background:#fff5f5;border-radius:6px;padding:4px 8px;margin-top:4px">⚠️ ${esc(item.comment)}</div>` : ''}
            ${item.photos && item.photos.length > 0 ? `
              <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">
                ${item.photos.map(ph => `<img src="${ph}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">`).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const photosHTML = allPhotos.length > 0 ? `
    <div class="report-card">
      <h2>📷 Fotodokumentation – samlad</h2>
      ${allPhotos.map(ph => `
        <div style="margin-bottom:14px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600">${esc(ph.section)} › ${esc(ph.label)}</div>
          <img src="${ph.src}" style="max-width:100%;border-radius:8px;border:1px solid var(--border)">
        </div>
      `).join('')}
    </div>
  ` : '';

  document.getElementById('report-body').innerHTML = `
    <div class="report-card" style="display:flex;align-items:center;gap:14px;padding:16px 18px">
      <img src="data:image/png;base64,${LOGO_B64}" style="width:48px;height:48px;object-fit:contain;border-radius:10px;flex-shrink:0">
      <div style="flex:1;min-width:0">
        <div style="font-size:17px;font-weight:700;line-height:1.2">Högt & Lågt-Städ AB</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Städrapport · ${p.date}</div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <div style="font-size:15px;font-weight:700;color:var(--text)">${esc(p.address)}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px">${tmpl.label}${p.workers.length ? ' &nbsp;·&nbsp; ' + p.workers.join(', ') : ''}</div>
        </div>
      </div>
    </div>

    <div class="report-card" style="padding:14px 18px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:10px 6px">
          <div style="font-size:22px;font-weight:800;color:var(--accent)">${doneCount}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Klara</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:10px 6px">
          <div style="font-size:22px;font-weight:800;color:${total - doneCount > 0 ? 'var(--warn)' : 'var(--accent)'}">${total - doneCount}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Återstår</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:10px 6px">
          <div style="font-size:22px;font-weight:800;color:${withComments > 0 ? 'var(--danger)' : 'var(--accent)'}">${withComments}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Felanm.</div>
        </div>
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:10px 6px">
          <div style="font-size:22px;font-weight:800;color:var(--accent)">${withPhotos}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Foton</div>
        </div>
      </div>
    </div>

    ${faultSummaryHTML}
    ${sectionsHTML}
    ${photosHTML}

    ${(() => {
      const internalItems = [];
      p.sections.forEach(s => s.items.forEach(item => {
        if (item.internalComment && item.internalComment.trim()) {
          internalItems.push({ section: s.title, label: item.label, note: item.internalComment });
        }
      }));
      if (internalItems.length === 0) return '';
      return '<div class="report-card" style="border:2px dashed var(--border);background:#f9f9f6"><h2>🔒 Interna noteringar (visas ej för kund)</h2>' +
        internalItems.map(i => '<div class="report-item-row"><div class="report-item-info"><div class="report-item-label" style="font-size:13px;color:var(--muted)">' + esc(i.section) + ' › ' + esc(i.label) + '</div><div style="font-size:13px;color:var(--text);margin-top:2px">' + esc(i.note) + '</div></div></div>').join('') +
        '</div>';
    })()}

    <div class="report-card">
      <h2>Signering</h2>
      <div class="sig-row">
        <div class="sig-box">
          <input type="text" placeholder="Städare">
          <div class="sig-box-label">Städare</div>
        </div>
        <div class="sig-box">
          <input type="text" placeholder="Kund / ansvarig">
          <div class="sig-box-label">Kund</div>
        </div>
      </div>
    </div>
  `;

  showScreen('screen-report');
}

function closeReport() {
  showScreen('screen-job');
}

function markCompleted() {
  const p = currentProject();
  if (!p) return;
  p.completed = true;
  save();
  renderJob();
}

function undoCompleted() {
  const p = currentProject();
  if (!p) return;
  p.completed = false;
  save();
  renderJob();
}

function resetJob() {
  showConfirm('Återställ alla bockar?', () => {
    const p = currentProject();
    p.sections.forEach(s => s.items.forEach(i => {
      i.done = false;
      i.timestamp = null;
    }));
    save();
    renderJob();
  });
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(d) {
  return d.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' }) + ' ' +
    d.toLocaleDateString('sv-SE', { day:'numeric', month:'short' });
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
load();
renderHome();
</script>

<!-- ═══ CONFIRM MODAL ═══ -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="padding-bottom:28px">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirm-title">Är du säker?</div>
    <p id="confirm-message" style="font-size:15px;color:var(--muted);margin-bottom:20px"></p>
    <button class="btn-modal-primary" id="confirm-ok" style="background:var(--danger)">Ta bort</button>
    <button class="btn-modal-secondary" onclick="closeModal('modal-confirm')">Avbryt</button>
  </div>
</div>
</body>
</html>
